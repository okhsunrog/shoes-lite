services:
  # Local TLS server acting as REALITY dest (anti-probing fallback).
  # Uses nginx for proper TLS 1.3 support with X25519 key exchange.
  dest:
    image: nginx:alpine
    volumes:
      - ./dest-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache openssl &&
        openssl genpkey -algorithm ED25519 -out /etc/ssl/private/key.pem 2>/dev/null &&
        openssl req -new -x509 -key /etc/ssl/private/key.pem -out /etc/ssl/certs/cert.pem \
          -days 365 -subj '/CN=www.example.com' 2>/dev/null &&
        exec nginx -g 'daemon off;'
    network_mode: host

  xray:
    image: ghcr.io/xtls/xray-core:latest
    volumes:
      - ./xray-config.json:/etc/xray/config.json:ro
    command: ["run", "-c", "/etc/xray/config.json"]
    network_mode: host
    depends_on:
      - dest

  echo:
    image: alpine:latest
    command: ["sh", "-c", "apk add --no-cache socat && exec socat TCP-LISTEN:18080,fork,reuseaddr EXEC:cat"]
    network_mode: host
